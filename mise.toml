[tools]
node = "20"

[tasks.install]
run = "npm install"
description = "Install npm dependencies"

[tasks.compile]
run = "npm run compile"
description = "Compile TypeScript to out/"

[tasks.watch]
run = "npm run watch"
description = "Watch and recompile on change"

[tasks.package]
run = "npm run package"
description = "Package extension as .vsix"

[tasks.publish]
run = "npm run publish"
description = "Publish to VS Code Marketplace (requires VSCE_PAT)"

[tasks.setup-vsce-pat]
run = "scripts/setup-vsce-pat.sh"
description = "Set VSCE_PAT GitHub Actions secret (prompts for token)"

