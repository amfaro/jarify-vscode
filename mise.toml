[tools]
node = "24"

[tasks.install]
run = "npm install"
description = "Install npm dependencies"

[tasks.compile]
run = "npm run compile"
description = "Compile TypeScript to out/"

[tasks.watch]
run = "npm run watch"
description = "Watch and recompile on change"

[tasks.package]
run = "npm run package"
description = "Package extension as .vsix"

[tasks.install-extension]
depends = ["package"]
run = """
# Locate the VS Code CLI — added to PATH via:
#   Cmd+Shift+P → "Shell Command: Install 'code' command in PATH"
if ! command -v code &>/dev/null; then
  echo "ERROR: 'code' not found in PATH."
  echo "In VS Code: Cmd+Shift+P → Shell Command: Install 'code' command in PATH"
  exit 1
fi
code --install-extension jarify-vscode-*.vsix
echo "✓ Installed. Reload VS Code: Cmd+Shift+P → Developer: Reload Window"
"""
description = "Build and install extension into local VS Code"
